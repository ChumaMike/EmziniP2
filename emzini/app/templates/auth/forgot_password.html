{% extends 'base.html' %}
{% block title %}Forgot Password — Emzini{% endblock %}
{% block content %}
<div class="min-h-[72vh] flex items-center justify-center px-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl flex items-center justify-center mx-auto mb-4"
           style="background:var(--teal);">
        <i class="fas fa-key text-white text-xl"></i>
      </div>
      <h1 class="text-xl font-bold text-white">Forgot your password?</h1>
      <p class="text-slate-500 text-sm mt-1">Enter your email and we'll send a reset link.</p>
    </div>

    <div class="card p-7 relative overflow-hidden">
      <div class="absolute top-0 left-8 right-8 h-px"
           style="background:linear-gradient(90deg,transparent,var(--teal),transparent);"></div>

      <form method="POST" class="space-y-4">
        <div>
          <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Email address</label>
          <input type="email" name="email" placeholder="you@email.com"
                 required autocomplete="email"/>
        </div>
        <button type="submit" class="btn-primary w-full justify-center py-3">
          <i class="fas fa-paper-plane mr-2"></i>Send Reset Link
        </button>
      </form>
    </div>

    <p class="text-center text-slate-500 text-sm mt-5">
      Remembered it?
      <a href="/login" class="font-medium transition" style="color:var(--teal-lt);">Sign in</a>
    </p>

  </div>
</div>
{% endblock %}
