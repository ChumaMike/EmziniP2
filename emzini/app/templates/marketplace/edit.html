{% extends 'base.html' %}
{% block title %}Edit Listing — {{ item.title }}{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto">

  <div class="mb-6">
    <a href="/market/{{ item.id }}" class="text-xs font-mono text-slate-500 hover:text-slate-300 transition flex items-center gap-1.5">
      <i class="fas fa-arrow-left text-[10px]"></i> Back to Listing
    </a>
    <h1 class="text-2xl font-bold text-white mt-4">Edit Listing</h1>
    <p class="text-slate-400 text-sm mt-1 font-mono">{{ item.title }}</p>
  </div>

  <div class="card p-6 relative overflow-hidden">
    <div class="absolute top-0 left-8 right-8 h-px"
         style="background:linear-gradient(90deg,transparent,var(--teal),transparent);"></div>

    <form method="POST" enctype="multipart/form-data" class="space-y-5">

      <div>
        <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Item Title</label>
        <input type="text" name="title" value="{{ item.title }}" required maxlength="200"/>
      </div>

      <div>
        <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Description</label>
        <textarea name="description" rows="4" required>{{ item.description }}</textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Asking Price (R)</label>
          <input type="number" name="price" min="1" step="0.01" value="{{ '%.2f'|format(item.price) }}" required/>
        </div>
        <div>
          <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Category</label>
          <select name="category">
            {% for cat in categories %}
            <option value="{{ cat }}" {{ 'selected' if cat == item.category }}>{{ cat|capitalize }}</option>
            {% endfor %}
          </select>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Stock Quantity</label>
          <input type="number" name="stock_qty" min="0" value="{{ item.stock_qty or 1 }}"/>
        </div>
        <div class="flex items-end pb-1">
          <label class="flex items-center gap-2 cursor-pointer text-sm text-slate-300">
            <input type="checkbox" name="allows_delivery" class="accent-teal-500 w-4 h-4"
                   {{ 'checked' if item.allows_delivery }}/>
            Allow runner delivery
          </label>
        </div>
      </div>

      <!-- Current photo -->
      {% if item.photo_filename %}
      <div>
        <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">Current Photo</label>
        <img src="{{ url_for('static', filename='uploads/market/' + item.photo_filename) }}"
             alt="{{ item.title }}" class="rounded-lg object-cover w-full" style="max-height:180px;">
      </div>
      {% endif %}

      <!-- Replace photo -->
      <div>
        <label class="block text-xs font-mono text-slate-400 uppercase tracking-wider mb-2">
          {{ 'Replace Photo' if item.photo_filename else 'Add Photo' }}
          <span class="normal-case text-slate-600">(optional · jpg/png/webp · max 8 MB)</span>
        </label>
        <label id="drop-zone"
               class="flex flex-col items-center justify-center gap-2 rounded-lg cursor-pointer transition-all"
               style="border:2px dashed var(--border-2);background:var(--border);min-height:100px;"
               onmouseover="this.style.borderColor='var(--teal)'"
               onmouseout="this.style.borderColor='var(--border-2)'">
          <div id="drop-placeholder" class="text-center py-5">
            <i class="fas fa-camera text-xl mb-1 block text-slate-600"></i>
            <p class="text-slate-500 text-xs">Click to upload a new photo</p>
          </div>
          <img id="photo-preview" class="hidden w-full rounded-lg object-cover" style="max-height:180px;" alt="Preview"/>
          <input id="photo-input" type="file" name="photo" accept="image/*" class="hidden" onchange="previewPhoto(this)"/>
        </label>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit" class="btn-primary flex-1 justify-center py-3">
          <i class="fas fa-floppy-disk mr-2"></i>Save Changes
        </button>
        <a href="/market/{{ item.id }}" class="btn-secondary px-6 justify-center">Cancel</a>
      </div>

    </form>
  </div>
</div>

{% block scripts %}
<script>
function previewPhoto(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var preview = document.getElementById('photo-preview');
    preview.src = e.target.result;
    preview.classList.remove('hidden');
    document.getElementById('drop-placeholder').classList.add('hidden');
    document.getElementById('drop-zone').style.borderColor = 'var(--teal)';
  };
  reader.readAsDataURL(file);
}
</script>
{% endblock %}
{% endblock %}
